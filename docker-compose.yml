services:
  forma-221:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forma-221-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=forma221
      - DB_USER=forma221
      - DB_PASSWORD=forma221pass
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: forma-221-postgres
    environment:
      - POSTGRES_DB=forma221
      - POSTGRES_USER=forma221
      - POSTGRES_PASSWORD=forma221pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: forma-221-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@forma221.local
      - PGADMIN_DEFAULT_PASSWORD=admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
